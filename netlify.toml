[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[redirects]]
  from = "/blog"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/univers"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/apropos"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/audio"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/confidentialite"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/article/*"
  to = "/index.html"
  status = 200
  force = true
