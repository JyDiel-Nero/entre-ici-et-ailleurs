<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin — Entre ici et ailleurs</title>
  <style id="cms-dark-theme">
    /* ═══ EIA CMS — Mode Nuit ═══ 
       Force EVERY element dark. No white anywhere. */

    *, *::before, *::after {
      border-color: rgba(201,169,110,.1) !important;
    }

    html, body, #nc-root, #root,
    [id="nc-root"] > div,
    [id="nc-root"] > div > div {
      background-color: #0D0F12 !important;
      color: rgba(201,169,110,.7) !important;
      font-family: -apple-system, 'Segoe UI', system-ui, sans-serif !important;
    }

    /* KILL all white/gray backgrounds globally */
    div, section, main, aside, nav, article, footer,
    header, form, fieldset, details, summary,
    ul, ol, li, dl, dt, dd, figure, figcaption,
    [class*="css-"] {
      background-color: transparent !important;
      color: inherit;
    }

    /* Top bar only */
    header, [class*="AppHeader"],
    [class*="css-"][class*="Header"],
    body > div > div > div:first-child > header,
    #nc-root > div > div > header {
      background-color: #111620 !important;
      border-bottom: 1px solid rgba(201,169,110,.08) !important;
    }
    header *, [class*="AppHeader"] * {
      color: #C9A96E !important;
      background-color: transparent !important;
    }

    /* Sidebar */
    aside, [class*="Sidebar"],
    nav[class*="css-"] {
      background-color: #111620 !important;
    }
    aside a, nav a, aside li, nav li,
    aside span, nav span {
      color: rgba(201,169,110,.5) !important;
      background-color: transparent !important;
    }
    aside a:hover, nav a:hover,
    aside a[class*="active"],
    aside a[aria-current="page"] {
      color: #E8C98A !important;
      background-color: rgba(201,169,110,.04) !important;
    }

    /* ALL headings */
    h1, h2, h3, h4, h5, h6 {
      color: #C9A96E !important;
      background-color: transparent !important;
    }
    h2 {
      text-transform: uppercase !important;
      letter-spacing: .06em !important;
      font-size: 14px !important;
      font-weight: 500 !important;
      padding: 4px 0 !important;
    }

    /* Labels — gold directly on dark */
    label, legend,
    [class*="ControlLabel"],
    [class*="Label"],
    span[class*="css-"] {
      color: #A8884E !important;
      background-color: transparent !important;
      text-transform: uppercase !important;
      letter-spacing: .06em !important;
      font-size: 11px !important;
      font-weight: 500 !important;
    }

    /* All text */
    p, span, li, td, th, div, summary, a {
      color: rgba(201,169,110,.6);
      background-color: transparent !important;
    }
    small, [class*="hint"], [class*="Hint"] {
      color: rgba(201,169,110,.3) !important;
    }

    /* Inputs */
    input[type="text"], input[type="number"], input[type="url"],
    input[type="email"], input[type="password"],
    input[type="datetime-local"], input[type="date"],
    textarea, select {
      background-color: #080A0E !important;
      border: 1px solid rgba(201,169,110,.12) !important;
      color: #E8C98A !important;
      border-radius: 3px !important;
      padding: 10px 12px !important;
    }
    input:focus, textarea:focus, select:focus {
      border-color: #C9A96E !important;
      outline: none !important;
      box-shadow: 0 0 0 1px rgba(201,169,110,.12) !important;
    }
    input[type="color"] {
      background-color: #080A0E !important;
      height: 38px !important;
      padding: 3px !important;
      cursor: pointer !important;
    }
    input[type="checkbox"] { accent-color: #C9A96E !important; }
    select { appearance: auto !important; }

    /* Buttons */
    button {
      background-color: transparent !important;
      color: #C9A96E !important;
      border: 1px solid rgba(201,169,110,.12) !important;
      border-radius: 3px !important;
    }
    button:hover {
      border-color: rgba(201,169,110,.25) !important;
      background-color: rgba(201,169,110,.04) !important;
    }

    /* Publish/save */
    [class*="ublish"] button,
    [class*="ToolbarButton"] > button:first-child {
      background-color: rgba(201,169,110,.1) !important;
      border-color: rgba(201,169,110,.25) !important;
      color: #E8C98A !important;
    }
    [class*="ublish"] span {
      background-color: rgba(46,139,87,.12) !important;
      color: #5cb85c !important;
      border: 1px solid rgba(46,139,87,.2) !important;
      border-radius: 3px !important;
    }

    /* List items / cards - NO gray boxes, just borders */
    fieldset, details {
      background-color: transparent !important;
      border: 1px solid rgba(201,169,110,.06) !important;
      border-radius: 4px !important;
      margin-bottom: 4px !important;
    }
    fieldset:hover, details:hover {
      border-color: rgba(201,169,110,.12) !important;
    }
    summary {
      color: rgba(201,169,110,.5) !important;
      cursor: pointer !important;
    }
    summary:hover { color: #C9A96E !important; }

    /* Collection list items — the main offender for white bg */
    [class*="ListCard"], [class*="EntryCard"],
    [class*="listCard"], [class*="entryCard"],
    [class*="ObjectControl"],
    [class*="ListItemTopBar"],
    [class*="TopBar"],
    [class*="NestedObjectLabel"],
    [class*="StyledListItemTopBar"] {
      background-color: transparent !important;
      background: transparent !important;
    }

    /* The expand/collapse bar area */
    [class*="TopBar"],
    [class*="ListItemTopBar"],
    [class*="StyledListItemTopBar"],
    [class*="css-"][draggable="true"],
    li[class*="css-"],
    li > div[class*="css-"] {
      background-color: transparent !important;
      background: transparent !important;
    }

    /* Object widget containers */
    [class*="ObjectWidget"],
    [class*="ObjectControl"],
    [class*="ListControl"],
    [class*="ExpandedListItem"],
    [class*="ListItem"] {
      background-color: transparent !important;
      background: transparent !important;
      border: none !important;
      border-bottom: 1px solid rgba(201,169,110,.05) !important;
    }

    /* Preview pane */
    [class*="PreviewPane"],
    [class*="previewPane"],
    [class*="EditorPreview"] {
      background-color: #0D0F12 !important;
    }

    /* Links */
    a { color: #C9A96E !important; }
    a:hover { color: #E8C98A !important; }

    /* Dropdowns */
    ul[role="listbox"], div[role="listbox"],
    [class*="MenuList"], [class*="menu"] {
      background-color: #151A22 !important;
      border: 1px solid rgba(201,169,110,.1) !important;
      box-shadow: 0 4px 12px rgba(0,0,0,.5) !important;
    }
    [class*="option"]:hover, li[role="option"]:hover {
      background-color: rgba(201,169,110,.06) !important;
    }
    [class*="singleValue"], [class*="placeholder"] { color: #E8C98A !important; }
    [class*="indicatorSeparator"] { background-color: rgba(201,169,110,.1) !important; }
    [class*="control"] {
      background-color: #080A0E !important;
      border-color: rgba(201,169,110,.12) !important;
    }

    /* Markdown editor */
    [class*="toolbar"], [class*="Toolbar"] {
      background-color: #111620 !important;
    }
    [class*="toolbar"] button, [class*="Toolbar"] button {
      color: rgba(201,169,110,.4) !important;
      border: none !important;
    }
    [class*="toolbar"] button:hover { color: #E8C98A !important; }
    [contenteditable="true"], [data-slate-editor="true"] {
      background-color: #080A0E !important;
      color: rgba(201,169,110,.7) !important;
      caret-color: #E8C98A !important;
    }

    /* File/Image upload */
    [class*="imageUpload"], [class*="ImageUpload"],
    [class*="fileUpload"], [class*="FileUpload"] {
      border: 1px dashed rgba(201,169,110,.12) !important;
      background-color: transparent !important;
    }

    /* Toast */
    [class*="oast"], [class*="otification"] {
      background-color: #151A22 !important;
      color: #E8C98A !important;
    }

    /* Login */
    [class*="ogin"] { background-color: #0D0F12 !important; }
    [class*="oginButton"] button {
      background-color: rgba(201,169,110,.08) !important;
      border: 1px solid rgba(201,169,110,.2) !important;
      color: #E8C98A !important;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: #0D0F12; }
    ::-webkit-scrollbar-thumb { background: rgba(201,169,110,.1); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(201,169,110,.2); }

    /* SVG */
    svg { fill: currentColor !important; color: inherit !important; }
    svg path { fill: inherit !important; }

    /* Image preview in editor */
    img { border-radius: 4px; }

    /* CMS toggle */
    #cms-theme-toggle {
      position: fixed; bottom: 16px; right: 16px; z-index: 99999;
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(17,22,32,.95) !important;
      border: 1px solid rgba(201,169,110,.15) !important;
      color: #C9A96E !important; font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(8px); transition: all .2s;
    }
    #cms-theme-toggle:hover {
      border-color: rgba(201,169,110,.4) !important;
      transform: scale(1.1);
    }
  </style>
</head>
<body>
  <button id="cms-theme-toggle" title="Theme CMS jour/nuit">☽</button>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    (function(){
      var btn = document.getElementById('cms-theme-toggle');
      var sheet = document.getElementById('cms-dark-theme');
      var saved = localStorage.getItem('eia-cms-theme') || 'dark';
      function apply(m){
        if(m==='light'){
          sheet.disabled=true;
          btn.textContent='☀';btn.title='Mode nuit';
          btn.style.background='rgba(240,240,240,.9)';
          btn.style.borderColor='rgba(0,0,0,.1)';
          btn.style.color='#666';
        } else {
          sheet.disabled=false;
          btn.textContent='☽';btn.title='Mode jour';
          btn.style.background='rgba(17,22,32,.95)';
          btn.style.borderColor='rgba(201,169,110,.15)';
          btn.style.color='#C9A96E';
        }
      }
      apply(saved);
      btn.addEventListener('click',function(){
        var next=sheet.disabled?'dark':'light';
        localStorage.setItem('eia-cms-theme',next);
        apply(next);
      });
    })();
  </script>
</body>
</html>
